<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>Мой первый WebAR</title>
    
    <!-- Подключаем библиотеку A-Frame (движок 3D) -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <!-- Подключаем библиотеку AR.js (движок дополненной реальности) -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    
    <!-- Сцена с настройками AR.js -->
    <a-scene embedded arjs>
      
      <!-- 
         Маркер типа "hiro.jpg". 
         Это стандартный маркер для тестов.
         Вы можете найти картинку маркера здесь: 
         https://github.com/AR-js-org/AR.js/blob/master/data/images/hiro.png
      -->
      <a-marker preset="hiro">
        
        <!-- Объект, который появится поверх маркера (в данном случае - синий куб) -->
        <a-box position='0 0.5 0' material='color: cyan;'></a-box>
        
        <!-- Пример: можно добавить текст -->
        <a-text value="Привет, AR!" position='0 1.5 0' scale='2 2 2' align='center' color='white'></a-text>
      
      </a-marker>

      <!-- Камера -->
      <a-entity camera></a-entity>
    </a-scene>

  </body>
</html>
